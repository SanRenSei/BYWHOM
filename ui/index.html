<html>
  <head>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: none;
        background-color: #000;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      canvas {
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      #hiddenInput {
        position:absolute;
        top:-100px;
        opacity:0;
      }

      @media screen and (orientation: portrait) {
          canvas {
            width: calc(100hv / 9.5 * 11);
            height: 100vh;
          }
      }

      @media screen and (orientation: landscape) {
          canvas {
              width: calc(100hv / 9.5 * 11);
              height: 100vh;
          }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <canvas id="mainCanvas" height="950" width="1100"></canvas>
      <input id="hiddenInput" />
    </div>
  </body>
  <script type="module">

  </script>
  <script src="dist/index.js" type="module"></script>
</html>
